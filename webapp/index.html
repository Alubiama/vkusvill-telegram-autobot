<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vkusvill Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap");
    :root {
      --bg0: #eff4ea;
      --bg1: #f7efd6;
      --bg2: #f1f6e7;
      --card: #ffffff;
      --ink: #193428;
      --muted: #4d6a5b;
      --ok: #17824f;
      --line: #ced9cb;
      --line-soft: #dfebe0;
      --accent: #1d8c55;
      --accent-soft: #ecf7ef;
      --danger: #9f3f3f;
      --danger-soft: #fff2f1;
      --shadow: 0 8px 28px rgba(23, 52, 37, 0.11);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      font-family: "Manrope", "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 88% -10%, #f7e4a6 0%, transparent 48%),
        radial-gradient(circle at -20% 110%, #cce8d0 0%, transparent 50%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 56%, var(--bg2));
      color: var(--ink);
      min-height: 100dvh;
      padding: 8px 8px calc(10px + env(safe-area-inset-bottom));
    }
    .shell {
      width: 100%;
      max-width: 388px;
      margin: 0 auto;
      display: grid;
      gap: 9px;
      padding-bottom: calc(18px + env(safe-area-inset-bottom));
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line-soft);
      border-radius: 16px;
      padding: 10px;
      box-shadow: var(--shadow);
      animation: fade-up 180ms ease-out;
    }
    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .top-copy {
      min-width: 0;
      flex: 1;
    }
    .t1 { font-size: 12px; font-weight: 700; color: var(--muted); }
    .t2 { font-size: 30px; line-height: 1; font-weight: 800; margin-top: 2px; }
    .hero-note {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #f5faf2;
      white-space: nowrap;
      color: #173224;
    }
    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 3px;
      line-height: 1.2;
    }
    .section-sub {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
      line-height: 1.35;
    }
    .tab-meta {
      margin-top: 6px;
      margin-bottom: 0;
      font-weight: 700;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-bottom: 2px;
    }
    .tab {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      padding: 7px 10px;
      white-space: nowrap;
      cursor: pointer;
      transition: transform 120ms ease-out, border-color 120ms ease-out, background 120ms ease-out;
    }
    .tab:hover {
      transform: translateY(-1px);
      border-color: #9bc3a8;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .sub-tabs {
      margin-top: 7px;
      gap: 5px;
    }
    .sub-tab {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f8fcf6;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      padding: 6px 9px;
      cursor: pointer;
      transition: transform 120ms ease-out, border-color 120ms ease-out, background 120ms ease-out;
    }
    .sub-tab.active {
      background: #eef8f0;
      color: var(--ok);
      border-color: #9bc7a9;
    }
    .group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .group-tools {
      display: flex;
      gap: 6px;
    }
    .tool-btn {
      border: 1px solid var(--line);
      background: #fcfdfb;
      color: var(--muted);
      border-radius: 9px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      padding: 6px 9px;
      cursor: pointer;
      opacity: 0.82;
      transition: all 130ms ease-out;
    }
    .tool-btn:hover {
      border-color: #a3c6ad;
      color: #244635;
      opacity: 1;
    }
    .tool-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }
    .items {
      display: grid;
      gap: 8px;
    }
    .item {
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      padding: 8px;
      background: #fdfefd;
      min-width: 0;
      transition: border-color 140ms ease-out, box-shadow 140ms ease-out, transform 140ms ease-out;
      animation: fade-up 180ms ease-out;
    }
    .item.selected {
      border-color: #79b58f;
      background: #f4fbf5;
      box-shadow: 0 8px 18px rgba(32, 95, 61, 0.13);
      transform: translateY(-1px);
    }
    .item-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 3px;
    }
    .item-meta-side {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex-wrap: wrap;
    }
    .item-head {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      margin-bottom: 6px;
    }
    .thumb {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--line-soft);
      background: #f4f8f3;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb-ph {
      font-size: 20px;
      line-height: 1;
      opacity: 0.8;
    }
    .item-main {
      min-width: 0;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid #b7dbc4;
      background: #f2fbf4;
      color: #206243;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 7px;
    }
    .selected-mark {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      border: 1px solid #9eceb0;
      background: #ebf8ef;
      color: #1e6340;
      font-size: 11px;
      font-weight: 800;
      padding: 3px 7px;
      white-space: nowrap;
    }
    .name {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.22;
      margin-bottom: 5px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }
    .price-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }
    .price-box {
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      padding: 7px 9px;
      background: #fff;
      min-width: 0;
      flex: 1;
    }
    .price-box.primary {
      background: #fbfdf9;
    }
    .price-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
    .price-val { font-size: 20px; font-weight: 800; line-height: 1; letter-spacing: -0.01em; }
    .discount { color: var(--ok); }
    .stock-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .stock-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid #b7dbc4;
      background: #f2fbf4;
      color: #206243;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      padding: 5px 8px;
      white-space: nowrap;
    }
    .stock-badge.low {
      border-color: #ebcf9f;
      background: #fff7ea;
      color: #8b5b13;
    }
    .stock-badge.critical {
      border-color: #efc4bb;
      background: #fff1ef;
      color: #963c32;
    }
    .toggle {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      padding: 9px 8px;
      cursor: pointer;
      min-height: 38px;
      transition: all 140ms ease-out;
    }
    .toggle:hover {
      border-color: #9bc7a9;
      transform: translateY(-1px);
    }
    .toggle.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .toggle:disabled {
      opacity: 0.7;
      cursor: default;
      color: var(--muted);
      background: #f6f8f4;
    }
    .actions {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 8px;
      position: sticky;
      bottom: 0;
      z-index: 7;
      background: linear-gradient(180deg, rgba(245, 239, 214, 0), rgba(245, 239, 214, 0.97) 25%);
      padding-top: 9px;
      padding-bottom: calc(4px + env(safe-area-inset-bottom));
      backdrop-filter: blur(6px);
    }
    .action-btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
      padding: 12px 9px;
      cursor: pointer;
      min-height: 46px;
      transition: transform 120ms ease-out, border-color 120ms ease-out;
      touch-action: manipulation;
    }
    .action-btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .action-btn.secondary {
      background: #f9fcf7;
      color: var(--muted);
      border-color: var(--line);
    }
    .action-btn:hover {
      transform: translateY(-1px);
      border-color: #95c3a5;
    }
    .action-btn:disabled {
      opacity: 0.7;
      cursor: default;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 18px 12px;
      line-height: 1.42;
      font-size: 13px;
    }
    .soft-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .send-state {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      color: var(--muted);
      background: #f7fbf6;
      line-height: 1.4;
    }
    .send-state.ok {
      color: #1e6340;
      border-color: #9eceb0;
      background: #ebf8ef;
    }
    .send-state.err {
      color: var(--danger);
      border-color: #e0b8b8;
      background: var(--danger-soft);
    }
    button:focus-visible {
      outline: 2px solid #1c8d56;
      outline-offset: 2px;
    }
    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @media (max-width: 360px) {
      .t2 { font-size: 24px; }
      .name { font-size: 14px; }
      .price-val { font-size: 20px; }
      .action-btn { font-size: 13px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="card top">
      <div class="top-copy">
        <div class="t1" id="appMeta">Скидки на сегодня</div>
        <div class="t2" id="day">-</div>
        <div class="hero-note" id="heroNote">Вкусное само себя не выберет.</div>
      </div>
      <div class="pill" id="summary">Выбрано: 0</div>
    </section>

    <section class="card">
      <div class="section-title">Что можно выбрать</div>
      <div id="tabs" class="tabs"></div>
      <div id="tabMeta" class="section-sub tab-meta"></div>
      <div id="subTabs" class="tabs sub-tabs" style="display:none"></div>
    </section>

    <section class="card">
      <div class="group-head">
        <div>
          <div class="section-title" id="groupTitle">-</div>
          <div class="section-sub" id="groupSub">-</div>
        </div>
        <div class="group-tools" id="groupTools">
          <button class="tool-btn" id="selectTabBtn" type="button">Выбрать всё</button>
          <button class="tool-btn" id="clearTabBtn" type="button">Сброс</button>
        </div>
      </div>
      <div id="items" class="items"></div>
    </section>

    <section class="actions">
      <button class="action-btn primary" id="sendAllBtn" type="button">Отправить выбор</button>
      <button class="action-btn secondary" id="clearAllBtn" type="button">Снять всё</button>
    </section>
    <section class="send-state" id="sendState" style="display:none" aria-live="polite"></section>
  </div>

  <script>
    const BUILD_ID = "b-20260313-ui-stage4";
    const READY_FOOD_PAGE_SIZE = 8;
    const PENDING_SELECTION_KEY = "vv_pending_selection_v1";
    const HEADER_QUOTES = [
      "Вкусное само себя не выберет.",
      "Хотели по одному, а выбрали как всегда с душой.",
      "Если товар хороший, его долго не откладывают.",
      "Что выбрано, то уже почти в корзине.",
    ];
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.expand();
      tg.ready();
    }

    function base64UrlToBytes(raw) {
      const padded = raw + "=".repeat((4 - (raw.length % 4)) % 4);
      const b64 = padded.replace(/-/g, "+").replace(/_/g, "/");
      const binary = atob(b64);
      return Uint8Array.from(binary, (ch) => ch.charCodeAt(0));
    }

    function decodeBase64UrlJson(raw) {
      if (!raw) return null;
      try {
        const bytes = base64UrlToBytes(raw);
        const text = new TextDecoder("utf-8").decode(bytes);
        return JSON.parse(text);
      } catch (_err) {
        return null;
      }
    }

    function decodeCompressedBase64UrlJson(raw) {
      if (!raw) return null;
      try {
        const bytes = base64UrlToBytes(raw);
        if (!window.pako || typeof window.pako.inflate !== "function") return null;
        const inflated = window.pako.inflate(bytes);
        const text = new TextDecoder("utf-8").decode(inflated);
        return JSON.parse(text);
      } catch (_err) {
        return null;
      }
    }

    function maybeInt(value) {
      if (value === null || value === undefined || value === "") return null;
      const num = Number(value);
      if (!Number.isFinite(num)) return null;
      const whole = Math.trunc(num);
      return whole >= 0 ? whole : null;
    }

    function unpackItem(x) {
      return {
        item_id: String(x?.i || x?.item_id || ""),
        name: String(x?.n || x?.name || ""),
        price: Number(x?.p ?? x?.price ?? 0),
        discount_price: Number(x?.d ?? x?.discount_price ?? 0),
        source: String(x?.s || x?.source || ""),
        image_url: String(x?.u || x?.image_url || ""),
        stock_qty: maybeInt(x?.q ?? x?.stock_qty),
        group_qty: maybeInt(x?.gt ?? x?.group_qty) || 0,
      };
    }

    function expandImageUrl(raw) {
      const s = String(raw || "").trim();
      if (!s) return "";
      if (s.startsWith("vi:")) {
        const parts = s.split(":");
        const variant = parts[1] || "0";
        const uuid = (parts[2] || "").toLowerCase();
        const looksUuid = /^[0-9a-f-]{36}$/.test(uuid);
        if (looksUuid) {
          const dir = variant === "1" ? "site/site_MiniWebP" : "site_MiniWebP";
          return `https://img.vkusvill.ru/pim/images/${dir}/${uuid}.webp`;
        }
      }
      if (s.startsWith("vv:")) {
        return `https://img.vkusvill.ru/pim/images/${s.slice(3)}`;
      }
      if (s.startsWith("//")) {
        return `https:${s}`;
      }
      if (s.startsWith("/")) {
        return `https://vkusvill.ru${s}`;
      }
      return s;
    }

    function buildImageCandidates(raw, itemId) {
      const first = expandImageUrl(raw);
      if (!first) return [];
      const out = [first];
      const mirrorPath = imageMirrorMap[String(itemId || "")] || "";
      if (mirrorPath) {
        if (mirrorPath.startsWith("http://") || mirrorPath.startsWith("https://")) {
          if (!out.includes(mirrorPath)) out.push(mirrorPath);
        } else {
          const rel = mirrorPath.startsWith("./")
            ? mirrorPath
            : `./${mirrorPath.replace(/^\/+/, "")}`;
          if (!out.includes(rel)) out.push(rel);
        }
      }
      const base = first.split("?")[0];
      const hasWebp = /\.webp$/i.test(base);
      const push = (value) => {
        if (!value) return;
        if (!out.includes(value)) out.push(value);
      };
      if (base.includes("/site/site_MiniWebP/")) {
        push(base.replace("/site/site_MiniWebP/", "/site_MiniWebP/"));
      }
      if (base.includes("/site_MiniWebP/")) {
        push(base.replace("/site_MiniWebP/", "/site/site_MiniWebP/"));
      }
      if (hasWebp) {
        push(base.replace(/\.webp$/i, ".jpg"));
        push(base.replace(/\.webp$/i, ".jpeg"));
        if (base.includes("MiniWebP")) {
          push(base.replace("MiniWebP", "MiniJPG").replace(/\.webp$/i, ".jpg"));
          push(base.replace("MiniWebP", "MiniJPEG").replace(/\.webp$/i, ".jpeg"));
        }
      }
      return out;
    }

    function validItem(x) {
      return Boolean(x.item_id && x.name);
    }

    const params = new URLSearchParams(window.location.search);
    const hasDataParam = params.has("data");
    let payload = (
      params.get("enc") === "z"
        ? decodeCompressedBase64UrlJson(params.get("data"))
        : decodeBase64UrlJson(params.get("data"))
    ) || decodeBase64UrlJson(params.get("data")) || {};

    function hasUsefulPayloadData(value) {
      if (!value || typeof value !== "object") return false;
      if (Array.isArray(value.m) && value.m.length) return true;
      if (Array.isArray(value.g) && value.g.length) return true;
      if (Array.isArray(value.items) && value.items.length) return true;
      if (Array.isArray(value.groups) && value.groups.length) return true;
      return false;
    }

    function loadLatestPayloadSync() {
      try {
        const xhr = new XMLHttpRequest();
        const stamp = Date.now();
        xhr.open("GET", `./latest.json?v=${stamp}`, false);
        xhr.setRequestHeader("Cache-Control", "no-cache");
        xhr.send(null);
        if (xhr.status >= 200 && xhr.status < 300 && xhr.responseText) {
          const data = JSON.parse(xhr.responseText);
          if (hasUsefulPayloadData(data)) return data;
        }
      } catch (_err) {
        return null;
      }
      return null;
    }

    if (!hasUsefulPayloadData(payload)) {
      const latestPayload = loadLatestPayloadSync();
      if (latestPayload) payload = latestPayload;
    }

    const now = new Date();
    const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
    const day = payload.day || payload.d || today;
    const snapshotId = String(payload.snapshot_id || payload.sid || "");
    let imageMirrorMap = {};
    document.getElementById("day").textContent = day;
    document.getElementById("appMeta").textContent = "Скидки на сегодня";

    const fallbackItems = Array.isArray(payload.items)
      ? payload.items.map(unpackItem).filter(validItem)
      : [];

    const payloadGroups = Array.isArray(payload.groups) ? payload.groups : [];
    const payloadFavorite = Array.isArray(payload.favorite)
      ? payload.favorite.map(unpackItem).filter(validItem)
      : [];
    const payloadReadyFood = Array.isArray(payload.extra_ready_food)
      ? payload.extra_ready_food.map(unpackItem).filter(validItem)
      : [];
    const compactMap = Array.isArray(payload.m) ? payload.m : [];
    const compactGroups = Array.isArray(payload.g) ? payload.g : [];
    const compactFavorite = Array.isArray(payload.f) ? payload.f : [];
    const compactReadyFood = Array.isArray(payload.r) ? payload.r : [];
    const compactGroupTotals = Array.isArray(payload.gt) ? payload.gt : [];
    const compactGroupTotalsByIndex = new Map(
      compactGroupTotals
        .filter((row) => Array.isArray(row) && row.length >= 2)
        .map((row) => [Number(row[0]), Number(row[1] || 0)]),
    );

    function fallbackGroupsFromItems(items) {
      const favorites = [];
      const regular = [];
      const readyFood = [];
      for (const item of items) {
        const src = item.source.toLowerCase();
        if (src.includes("favorite") || src.includes("fav")) favorites.push(item);
        else if (src.startsWith("vkusvill_offers_ready_food")) readyFood.push(item);
        else regular.push(item);
      }
      regular.splice(18);
      const groups = [];
      for (let i = 0; i < 3; i++) {
        groups.push({
          id: `g${i + 1}`,
          title: `Подборка ${i + 1}`,
          items: regular.slice(i * 6, i * 6 + 6),
          type: "group",
        });
      }
      return { groups, favorite: favorites.slice(0, 1), readyFood };
    }

    let groups = [];
    let favoriteItems = [];
    let readyFoodItems = [];
    if (compactMap.length && compactGroups.length) {
      const mapItem = (idx) => {
        const row = compactMap[Number(idx)];
        if (!Array.isArray(row) || row.length < 3) return null;
        return {
          item_id: String(row[0] || ""),
          name: String(row[1] || ""),
          price: 0,
          discount_price: Number(row[2] || 0),
          source: "",
          image_url: expandImageUrl(row[3]),
          stock_qty: maybeInt(row[4]),
          group_qty: Number(compactGroupTotalsByIndex.get(Number(idx)) || 0),
        };
      };
      groups = [0, 1, 2].map((idx) => {
        const ids = Array.isArray(compactGroups[idx]) ? compactGroups[idx] : [];
        const gItems = ids.map(mapItem).filter(validItem);
        return {
          id: `g${idx + 1}`,
          title: `Подборка ${idx + 1}`,
          items: gItems.slice(0, 6),
          type: "group",
        };
      });
      favoriteItems = compactFavorite.map(mapItem).filter(validItem).slice(0, 1);
      readyFoodItems = compactReadyFood.map(mapItem).filter(validItem);
    } else if (payloadGroups.length) {
      groups = [0, 1, 2].map((idx) => {
        const g = payloadGroups[idx] || {};
        const gItems = Array.isArray(g.items) ? g.items.map(unpackItem).filter(validItem) : [];
        return {
          id: String(g.id || `g${idx + 1}`),
          title: String(g.title || `Подборка ${idx + 1}`),
          items: gItems.slice(0, 6),
          type: "group",
        };
      });
      favoriteItems = payloadFavorite.slice(0, 1);
      readyFoodItems = payloadReadyFood;
    } else {
      const fb = fallbackGroupsFromItems(fallbackItems);
      groups = fb.groups;
      favoriteItems = fb.favorite;
      readyFoodItems = fb.readyFood;
    }

    const tabs = [...groups];
    if (favoriteItems.length) {
      tabs.push({
        id: "favorite",
        title: "Любимый",
        items: favoriteItems,
        type: "favorite",
      });
    }
    if (readyFoodItems.length) {
      tabs.push({
        id: "ready_food",
        title: "Готовая еда",
        items: readyFoodItems,
        type: "ready_food",
      });
    }

    const allById = new Map();
    for (const item of [...groups.flatMap((g) => g.items), ...favoriteItems, ...readyFoodItems]) {
      if (!item?.item_id) continue;
      if (!allById.has(item.item_id)) allById.set(item.item_id, item);
    }
    const allRealItems = Array.from(allById.values());

    function updateOverview() {
      const el = document.getElementById("appMeta");
      if (!el) return;
      const regularCount = Number(payload.regular_count ?? payload.rc ?? groups.reduce((acc, g) => acc + g.items.length, 0));
      const regularCapacity = Number(payload.regular_capacity ?? payload.cap ?? 18);
      const parts = [`${regularCount}/${regularCapacity} скидок`];
      if (favoriteItems.length) parts.push("любимый");
      if (readyFoodItems.length) parts.push(`еда ${readyFoodItems.length}`);
      el.textContent = parts.join(" · ");
    }

    function setSendState(text, kind = "ok") {
      const el = document.getElementById("sendState");
      if (!el) return;
      el.style.display = "block";
      el.className = `send-state ${kind}`;
      el.textContent = text;
    }
    function clearSendState() {
      const el = document.getElementById("sendState");
      if (!el) return;
      el.style.display = "none";
      el.className = "send-state";
      el.textContent = "";
    }
    function savePendingSelection(payloadOut) {
      try {
        localStorage.setItem(PENDING_SELECTION_KEY, JSON.stringify({
          saved_at: Date.now(),
          build_id: BUILD_ID,
          payload: payloadOut,
        }));
      } catch (_err) {
        // noop
      }
    }
    function loadPendingSelection() {
      try {
        const raw = localStorage.getItem(PENDING_SELECTION_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : null;
      } catch (_err) {
        return null;
      }
    }
    function clearPendingSelection() {
      try {
        localStorage.removeItem(PENDING_SELECTION_KEY);
      } catch (_err) {
        // noop
      }
    }
    const selected = {};
    for (const item of allRealItems) {
      const initial = Number((payload.your || {})[item.item_id] || 0);
      selected[item.item_id] = initial > 0 ? 1 : 0;
    }

    const pendingSelection = loadPendingSelection();
    if (pendingSelection && pendingSelection.payload && pendingSelection.payload.day === day) {
      const pendingQty = pendingSelection.payload.qty || {};
      const hasLiveSelection = Object.values(selected).some((value) => Number(value || 0) > 0);
      if (!hasLiveSelection) {
        for (const item of allRealItems) {
          if (!item?.item_id) continue;
          selected[item.item_id] = Number(pendingQty[item.item_id] || 0) > 0 ? 1 : 0;
        }
      }
    }

    let activeTab = tabs.length ? tabs[0].id : "g1";
    let readyFoodPage = 0;

    function rub(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n)) return "--";
      const text = Number.isInteger(n) ? String(n) : n.toFixed(2);
      return `${text} ₽`;
    }

    function stockBadgeState(value) {
      const qty = maybeInt(value);
      if (qty === null) return null;
      if (qty <= 3) return "critical";
      if (qty <= 8) return "low";
      return "ok";
    }

    function selectedCount() {
      return Object.values(selected).reduce((acc, n) => acc + Number(n || 0), 0);
    }

    function syncTelegramMainButton() {
      if (!tg || !tg.MainButton) return;
      const count = selectedCount();
      tg.MainButton.setText(count > 0 ? `Отправить выбор (${count})` : "Отправить выбор");
      if (count > 0) tg.MainButton.show();
      else tg.MainButton.hide();
    }

    function updateSummary() {
      document.getElementById("summary").textContent = `Выбрано: ${selectedCount()}`;
      const hero = document.getElementById("heroNote");
      if (hero) {
        const count = selectedCount();
        const idx = count > 0 ? Math.min(count, HEADER_QUOTES.length - 1) : 0;
        hero.textContent = HEADER_QUOTES[idx];
      }
      syncTelegramMainButton();
    }

    function getActiveTab() {
      return tabs.find((x) => x.id === activeTab) || tabs[0] || null;
    }

    function getVisibleItems(tab) {
      if (!tab) return [];
      if (tab.type !== "ready_food") return Array.isArray(tab.items) ? tab.items : [];
      const start = readyFoodPage * READY_FOOD_PAGE_SIZE;
      return (tab.items || []).slice(start, start + READY_FOOD_PAGE_SIZE);
    }

    function getTabMeta(tab) {
      if (!tab) return "";
      if (tab.type === "group") return `${tab.title} · ${tab.items.length} из 6 товаров`;
      if (tab.type === "favorite") return "Любимый товар дня";
      if (tab.type === "ready_food") {
        const pages = Math.max(1, Math.ceil((tab.items.length || 0) / READY_FOOD_PAGE_SIZE));
        return `Готовая еда · ${tab.items.length} товаров · страница ${readyFoodPage + 1} из ${pages}`;
      }
      return `${tab.items.length} товаров`;
    }

    function setTabSelection(mode) {
      const tab = getActiveTab();
      const visibleItems = getVisibleItems(tab);
      if (!tab || !visibleItems.length) return;
      const next = mode === "all" ? 1 : 0;
      for (const item of visibleItems) {
        if (!item?.item_id) continue;
        selected[item.item_id] = next;
      }
      renderGroup();
      updateSummary();
    }

    function toggleItem(itemId) {
      if (!itemId) return;
      selected[itemId] = selected[itemId] ? 0 : 1;
      renderGroup();
      updateSummary();
    }

    function clearAllSelection() {
      for (const item of allRealItems) {
        if (!item?.item_id) continue;
        selected[item.item_id] = 0;
      }
      clearPendingSelection();
      renderGroup();
      updateSummary();
      setSendState("Выбор очищен. Нажми «Отправить выбор», чтобы бот сохранил отмену.", "ok");
    }

    function renderTabs() {
      const root = document.getElementById("tabs");
      root.innerHTML = "";
      const labels = { g1: "1", g2: "2", g3: "3", favorite: "Любимый", ready_food: "Еда" };
      for (const tab of tabs) {
        const btn = document.createElement("button");
        btn.className = `tab${tab.id === activeTab ? " active" : ""}`;
        const label = labels[tab.id] || tab.title;
        btn.textContent = tab.type === "ready_food" ? `${label} ${tab.items.length}` : label;
        btn.addEventListener("click", () => {
          activeTab = tab.id;
          if (tab.type === "ready_food") readyFoodPage = 0;
          renderTabs();
          renderGroup();
        });
        root.appendChild(btn);
      }
    }

    function renderSubTabs(tab) {
      const root = document.getElementById("subTabs");
      if (!root) return;
      root.innerHTML = "";
      if (!tab || tab.type !== "ready_food" || tab.items.length <= READY_FOOD_PAGE_SIZE) {
        root.style.display = "none";
        return;
      }
      root.style.display = "flex";
      const pageCount = Math.ceil(tab.items.length / READY_FOOD_PAGE_SIZE);
      for (let page = 0; page < pageCount; page++) {
        const start = page * READY_FOOD_PAGE_SIZE + 1;
        const end = Math.min((page + 1) * READY_FOOD_PAGE_SIZE, tab.items.length);
        const btn = document.createElement("button");
        btn.className = `sub-tab${page === readyFoodPage ? " active" : ""}`;
        btn.textContent = `${start}-${end}`;
        btn.addEventListener("click", () => {
          readyFoodPage = page;
          renderSubTabs(tab);
          renderGroup();
        });
        root.appendChild(btn);
      }
    }

    function renderRealItem(itemsEl, item) {
      const wrap = document.createElement("article");
      const isSelected = Boolean(selected[item.item_id]);
      wrap.className = `item${isSelected ? " selected" : ""}`;

      const src = String(item.source || "").toLowerCase();
      const isFavorite = src.includes("favorite") || src.includes("fav") || String(item.item_id || "").startsWith("fav_");
      const isReadyFood = src.startsWith("vkusvill_offers_ready_food");
      if (isFavorite || isReadyFood) {
        const meta = document.createElement("div");
        meta.className = "item-meta";
        const left = document.createElement("div");
        left.className = "item-meta-side";
        const right = document.createElement("div");
        right.className = "item-meta-side";
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = isFavorite ? "❤️ Любимый" : "🍱 Готовая еда";
        left.appendChild(tag);
        if (isSelected) {
          const mark = document.createElement("span");
          mark.className = "selected-mark";
          mark.textContent = "✓ Выбрано";
          right.appendChild(mark);
        }
        meta.appendChild(left);
        meta.appendChild(right);
        wrap.appendChild(meta);
      } else if (isSelected) {
        const meta = document.createElement("div");
        meta.className = "item-meta";
        const left = document.createElement("div");
        left.className = "item-meta-side";
        const right = document.createElement("div");
        right.className = "item-meta-side";
        const mark = document.createElement("span");
        mark.className = "selected-mark";
        mark.textContent = "✓ Выбрано";
        right.appendChild(mark);
        meta.appendChild(left);
        meta.appendChild(right);
        wrap.appendChild(meta);
      }

      const head = document.createElement("div");
      head.className = "item-head";
      const thumb = document.createElement("div");
      thumb.className = "thumb";
      const imageUrl = String(item.image_url || "").trim();
      if (imageUrl) {
        const candidates = buildImageCandidates(imageUrl, item.item_id);
        const img = document.createElement("img");
        img.alt = item.name;
        img.loading = "lazy";
        let idx = 0;
        const loadNext = () => {
          if (idx >= candidates.length) {
            thumb.innerHTML = `<span class="thumb-ph">${isReadyFood ? "🍱" : "🥗"}</span>`;
            return;
          }
          img.src = candidates[idx];
          idx += 1;
        };
        img.onerror = () => {
          loadNext();
        };
        thumb.appendChild(img);
        loadNext();
      } else {
        thumb.innerHTML = `<span class="thumb-ph">${isReadyFood ? "🍱" : "🥗"}</span>`;
      }
      head.appendChild(thumb);

      const main = document.createElement("div");
      main.className = "item-main";
      const name = document.createElement("div");
      name.className = "name";
      name.textContent = item.name;
      main.appendChild(name);

      const stockQty = maybeInt(item.stock_qty);
      const groupQty = Number(item.group_qty || 0);
      if (stockQty !== null || groupQty > 0) {
        const stockRow = document.createElement("div");
        stockRow.className = "stock-row";
        if (stockQty !== null) {
          const stock = document.createElement("span");
          const state = stockBadgeState(stockQty);
          stock.className = `stock-badge${state && state !== "ok" ? ` ${state}` : ""}`;
          stock.textContent = `Осталось: ${stockQty} шт`;
          stockRow.appendChild(stock);
        }
        if (groupQty > 0) {
          const group = document.createElement("span");
          group.className = "stock-badge";
          group.textContent = `Выбрали: ${groupQty}`;
          stockRow.appendChild(group);
        }
        main.appendChild(stockRow);
      }

      const prices = document.createElement("div");
      prices.className = "price-row";
      const currentPrice = Number(item.discount_price || item.price || 0);
      prices.innerHTML = `
        <div class="price-box primary">
          <div class="price-label">Цена сегодня</div>
          <div class="price-val discount">${rub(currentPrice)}</div>
        </div>
      `;
      main.appendChild(prices);

      head.appendChild(main);
      wrap.appendChild(head);

      const t = document.createElement("button");
      t.className = `toggle${isSelected ? " active" : ""}`;
      t.textContent = isSelected ? "✅ Выбрано" : "Выбрать";
      t.addEventListener("click", () => toggleItem(item.item_id));
      wrap.appendChild(t);
      itemsEl.appendChild(wrap);
    }

    function renderGroup() {
      const titleEl = document.getElementById("groupTitle");
      const subEl = document.getElementById("groupSub");
      const metaEl = document.getElementById("tabMeta");
      const itemsEl = document.getElementById("items");
      const toolsEl = document.getElementById("groupTools");
      const selectBtn = document.getElementById("selectTabBtn");
      const clearBtn = document.getElementById("clearTabBtn");
      itemsEl.innerHTML = "";

      const tab = getActiveTab();
      if (!tab) {
        titleEl.textContent = "Нет товаров";
        subEl.textContent = "";
        if (metaEl) metaEl.textContent = "Данные на сегодня пока не готовы";
        if (toolsEl) toolsEl.style.display = "none";
        const empty = document.createElement("div");
        empty.className = "empty";
        if (!hasDataParam) {
          empty.innerHTML = "Здесь нет данных по товарам.<br/>Открой Mini App через команду /app в боте.";
        } else {
          empty.innerHTML = "Пока нет товаров на сегодня.<br/>Попробуй открыть Mini App чуть позже.";
        }
        itemsEl.appendChild(empty);
        renderSubTabs(null);
        return;
      }

      titleEl.textContent = tab.title;
      subEl.textContent = tab.type === "group"
        ? "Выбери то, что тебе подходит"
        : "Нажми на нужные товары и отправь выбор";
      if (metaEl) metaEl.textContent = getTabMeta(tab);
      const visibleItems = getVisibleItems(tab);
      renderSubTabs(tab);

      if (toolsEl) {
        toolsEl.style.display = visibleItems.length ? "flex" : "none";
      }
      if (selectBtn) {
        selectBtn.disabled = !visibleItems.length;
        selectBtn.textContent = visibleItems.length <= 1 ? "Выбрать" : "Выбрать всё";
      }
      if (clearBtn) {
        clearBtn.disabled = !visibleItems.length;
      }

      if (!visibleItems.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = tab.type === "group"
          ? "Эта подборка еще не обновилась.<div class=\"soft-note\">Остальные товары появятся после следующего обновления.</div>"
          : "Здесь пока нет доступных товаров.";
        itemsEl.appendChild(empty);
        return;
      }

      for (const item of visibleItems) {
        renderRealItem(itemsEl, item);
      }
    }

    async function loadImageMirrorMap() {
      try {
        const stamp = String(day || "").replace(/-/g, "");
        const resp = await fetch(`./img-cache/current/map.json?v=${encodeURIComponent(stamp)}`, {
          cache: "no-store",
        });
        if (!resp.ok) return;
        const data = await resp.json();
        if (!data || typeof data.items !== "object" || !data.items) return;
        imageMirrorMap = data.items;
        renderGroup();
      } catch (_err) {
        // Primary source remains VkusVill CDN.
      }
    }

    let sendInFlight = false;
    function sendAll() {
      if (sendInFlight) return;
      sendInFlight = true;
      clearSendState();
      const btn = document.getElementById("sendAllBtn");
      if (btn) {
        btn.disabled = true;
        btn.textContent = "Отправляем...";
      }
      if (tg && tg.MainButton) {
        tg.MainButton.showProgress(false);
        tg.MainButton.disable();
      }
      const qty = {};
      for (const item of allRealItems) {
        qty[item.item_id] = selected[item.item_id] ? 1 : 0;
      }
      const payloadOut = { type: "all_choices", day, snapshot_id: snapshotId, qty };
      savePendingSelection(payloadOut);
      try {
        if (!tg || typeof tg.sendData !== "function") {
          throw new Error("Telegram WebApp API unavailable");
        }
        tg.sendData(JSON.stringify(payloadOut));
        setSendState("Выбор отправлен. Если бот молчит 3-5 секунд, открой /app заново и нажми еще раз.", "ok");
      } catch (err) {
        const reason = (err && err.message) ? err.message : "unknown";
        const hasTg = Boolean(tg);
        const hasSendData = Boolean(tg && typeof tg.sendData === "function");
        const initDataLen = (tg && tg.initData) ? String(tg.initData).length : 0;
        setSendState(
          `Отправка не сработала (${reason}). hasTg=${hasTg}, hasSendData=${hasSendData}, initDataLen=${initDataLen}.`,
          "err",
        );
      } finally {
        sendInFlight = false;
        if (btn) {
          btn.disabled = false;
          btn.textContent = "Отправить выбор";
        }
        if (tg && tg.MainButton) {
          tg.MainButton.hideProgress();
          tg.MainButton.enable();
          syncTelegramMainButton();
        }
      }
    }

    function bindTapAction(element, handler) {
      if (!element) return;
      let lastTs = 0;
      const wrapped = (event) => {
        const nowTs = Date.now();
        if (nowTs - lastTs < 400) return;
        lastTs = nowTs;
        if (event && typeof event.preventDefault === "function") event.preventDefault();
        handler();
      };
      element.addEventListener("click", wrapped);
      element.addEventListener("touchend", wrapped, { passive: false });
    }

    if (tg && tg.MainButton && typeof tg.MainButton.onClick === "function") {
      tg.MainButton.onClick(sendAll);
    }

    bindTapAction(document.getElementById("sendAllBtn"), sendAll);
    bindTapAction(document.getElementById("clearAllBtn"), clearAllSelection);
    document.getElementById("selectTabBtn").addEventListener("click", () => setTabSelection("all"));
    document.getElementById("clearTabBtn").addEventListener("click", () => setTabSelection("none"));

    updateSummary();
    updateOverview();
    renderTabs();
    renderGroup();
    loadImageMirrorMap();
    if (pendingSelection && pendingSelection.payload && pendingSelection.payload.day === day && selectedCount() > 0) {
      setSendState("Нашел несохраненный выбор. Можно спокойно нажать «Отправить выбор» еще раз.", "ok");
    }
  </script>
</body>
</html>
