<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vkusvill Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap");
    :root {
      --bg0: #eff4ea;
      --bg1: #f7efd6;
      --bg2: #f1f6e7;
      --card: #ffffff;
      --ink: #193428;
      --muted: #4d6a5b;
      --ok: #17824f;
      --line: #ced9cb;
      --line-soft: #dfebe0;
      --accent: #1d8c55;
      --accent-soft: #ecf7ef;
      --danger: #9f3f3f;
      --danger-soft: #fff2f1;
      --shadow: 0 8px 28px rgba(23, 52, 37, 0.11);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      font-family: "Manrope", "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 88% -10%, #f7e4a6 0%, transparent 48%),
        radial-gradient(circle at -20% 110%, #cce8d0 0%, transparent 50%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 56%, var(--bg2));
      color: var(--ink);
      min-height: 100dvh;
      padding: 8px 8px calc(10px + env(safe-area-inset-bottom));
    }
    .shell {
      width: 100%;
      max-width: 372px;
      margin: 0 auto;
      display: grid;
      gap: 9px;
      padding-bottom: 6px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line-soft);
      border-radius: 16px;
      padding: 10px;
      box-shadow: var(--shadow);
      animation: fade-up 180ms ease-out;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .t1 { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.01em; }
    .t2 { font-size: 28px; line-height: 1; font-weight: 800; margin-top: 2px; }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #f5faf2;
      white-space: nowrap;
      color: #173224;
    }
    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 3px;
      line-height: 1.2;
    }
    .section-sub {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
      line-height: 1.35;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-bottom: 2px;
    }
    .tab {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      padding: 7px 10px;
      white-space: nowrap;
      cursor: pointer;
      transition: transform 120ms ease-out, border-color 120ms ease-out, background 120ms ease-out;
    }
    .tab:hover {
      transform: translateY(-1px);
      border-color: #9bc3a8;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .group-tools {
      display: flex;
      gap: 6px;
    }
    .tool-btn {
      border: 1px solid var(--line);
      background: #f9fdf8;
      color: var(--muted);
      border-radius: 9px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      padding: 7px 9px;
      cursor: pointer;
      transition: all 130ms ease-out;
    }
    .tool-btn:hover {
      border-color: #a3c6ad;
      color: #244635;
    }
    .tool-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .items {
      display: grid;
      gap: 8px;
    }
    .item {
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      padding: 8px;
      background: #fdfefd;
      min-width: 0;
      transition: border-color 140ms ease-out, box-shadow 140ms ease-out, transform 140ms ease-out;
      animation: fade-up 180ms ease-out;
    }
    .item.selected {
      border-color: #8dc2a1;
      box-shadow: 0 4px 14px rgba(32, 95, 61, 0.13);
      transform: translateY(-1px);
    }
    .item-meta {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 3px;
    }
    .item-head {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      margin-bottom: 6px;
    }
    .thumb {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--line-soft);
      background: #f4f8f3;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb-ph {
      font-size: 20px;
      line-height: 1;
      opacity: 0.8;
    }
    .item-main {
      min-width: 0;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid #b7dbc4;
      background: #f2fbf4;
      color: #206243;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 7px;
    }
    .name {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.22;
      margin-bottom: 5px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }
    .price-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }
    .price-box {
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      padding: 6px 8px;
      background: #fff;
      min-width: 0;
      flex: 1;
    }
    .price-label { font-size: 10px; color: var(--muted); margin-bottom: 1px; }
    .price-val { font-size: 17px; font-weight: 800; line-height: 1; letter-spacing: -0.01em; }
    .discount { color: var(--ok); }
    .toggle {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      padding: 9px 8px;
      cursor: pointer;
      min-height: 38px;
      transition: all 140ms ease-out;
    }
    .toggle:hover {
      border-color: #9bc7a9;
      transform: translateY(-1px);
    }
    .toggle.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .toggle:disabled {
      opacity: 0.7;
      cursor: default;
      color: var(--muted);
      background: #f6f8f4;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      position: sticky;
      bottom: 0;
      background: linear-gradient(180deg, rgba(245, 239, 214, 0), rgba(245, 239, 214, 0.95) 25%);
      padding-top: 9px;
    }
    .action-btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
      padding: 12px 9px;
      cursor: pointer;
      min-height: 46px;
      transition: transform 120ms ease-out, border-color 120ms ease-out;
    }
    .action-btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .action-btn:hover {
      transform: translateY(-1px);
      border-color: #95c3a5;
    }
    .action-btn:disabled {
      opacity: 0.7;
      cursor: default;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 20px 10px;
      line-height: 1.42;
      font-size: 13px;
    }
    .send-state {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      color: var(--muted);
      background: #f7fbf6;
      line-height: 1.4;
    }
    .send-state.ok {
      color: #1e6340;
      border-color: #9eceb0;
      background: #ebf8ef;
    }
    .send-state.err {
      color: var(--danger);
      border-color: #e0b8b8;
      background: var(--danger-soft);
    }
    button:focus-visible {
      outline: 2px solid #1c8d56;
      outline-offset: 2px;
    }
    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @media (max-width: 360px) {
      .t2 { font-size: 24px; }
      .name { font-size: 14px; }
      .price-val { font-size: 20px; }
      .action-btn { font-size: 13px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="card top">
      <div>
        <div class="t1" id="appMeta">Vkusvill Mini App</div>
        <div class="t2" id="day">-</div>
      </div>
      <div class="pill" id="summary">Выбрано: 0</div>
    </section>

    <section class="card">
      <div class="section-title">Товары на сегодня</div>
      <div class="section-sub" id="overviewSub">3 подборки по 6. Любимый товар вынесен отдельно.</div>
      <div id="tabs" class="tabs"></div>
    </section>

    <section class="card">
      <div class="group-head">
        <div>
          <div class="section-title" id="groupTitle">-</div>
          <div class="section-sub" id="groupSub">-</div>
        </div>
        <div class="group-tools" id="groupTools">
          <button class="tool-btn" id="selectTabBtn" type="button">Выбрать всё</button>
          <button class="tool-btn" id="clearTabBtn" type="button">Сброс</button>
        </div>
      </div>
      <div id="items" class="items"></div>
    </section>

    <section class="actions">
      <button class="action-btn primary" id="sendAllBtn">Отправить выбор</button>
      <button class="action-btn" id="closeBtn">Закрыть</button>
    </section>
    <section class="send-state" id="sendState" style="display:none" aria-live="polite"></section>
  </div>

  <script>
    const BUILD_ID = "b-20260311-ui2";
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.expand();
      tg.ready();
    }

    function base64UrlToBytes(raw) {
      const padded = raw + "=".repeat((4 - (raw.length % 4)) % 4);
      const b64 = padded.replace(/-/g, "+").replace(/_/g, "/");
      const binary = atob(b64);
      return Uint8Array.from(binary, (ch) => ch.charCodeAt(0));
    }

    function decodeBase64UrlJson(raw) {
      if (!raw) return null;
      try {
        const bytes = base64UrlToBytes(raw);
        const text = new TextDecoder("utf-8").decode(bytes);
        return JSON.parse(text);
      } catch (_err) {
        return null;
      }
    }

    function decodeCompressedBase64UrlJson(raw) {
      if (!raw) return null;
      try {
        const bytes = base64UrlToBytes(raw);
        if (!window.pako || typeof window.pako.inflate !== "function") return null;
        const inflated = window.pako.inflate(bytes);
        const text = new TextDecoder("utf-8").decode(inflated);
        return JSON.parse(text);
      } catch (_err) {
        return null;
      }
    }

    function unpackItem(x) {
      return {
        item_id: String(x?.i || x?.item_id || ""),
        name: String(x?.n || x?.name || ""),
        price: Number(x?.p ?? x?.price ?? 0),
        discount_price: Number(x?.d ?? x?.discount_price ?? 0),
        source: String(x?.s || x?.source || ""),
        image_url: String(x?.u || x?.image_url || ""),
      };
    }

    function expandImageUrl(raw) {
      const s = String(raw || "").trim();
      if (!s) return "";
      if (s.startsWith("vi:")) {
        const parts = s.split(":");
        const variant = parts[1] || "0";
        const uuid = (parts[2] || "").toLowerCase();
        const looksUuid = /^[0-9a-f-]{36}$/.test(uuid);
        if (looksUuid) {
          const dir = variant === "1" ? "site/site_MiniWebP" : "site_MiniWebP";
          return `https://img.vkusvill.ru/pim/images/${dir}/${uuid}.webp`;
        }
      }
      if (s.startsWith("vv:")) {
        return `https://img.vkusvill.ru/pim/images/${s.slice(3)}`;
      }
      if (s.startsWith("//")) {
        return `https:${s}`;
      }
      if (s.startsWith("/")) {
        return `https://vkusvill.ru${s}`;
      }
      return s;
    }

    function buildImageCandidates(raw) {
      const first = expandImageUrl(raw);
      if (!first) return [];
      const out = [first];
      const base = first.split("?")[0];
      const hasWebp = /\.webp$/i.test(base);
      const push = (value) => {
        if (!value) return;
        if (!out.includes(value)) out.push(value);
      };
      if (base.includes("/site/site_MiniWebP/")) {
        push(base.replace("/site/site_MiniWebP/", "/site_MiniWebP/"));
      }
      if (base.includes("/site_MiniWebP/")) {
        push(base.replace("/site_MiniWebP/", "/site/site_MiniWebP/"));
      }
      if (hasWebp) {
        push(base.replace(/\.webp$/i, ".jpg"));
        push(base.replace(/\.webp$/i, ".jpeg"));
        if (base.includes("MiniWebP")) {
          push(base.replace("MiniWebP", "MiniJPG").replace(/\.webp$/i, ".jpg"));
          push(base.replace("MiniWebP", "MiniJPEG").replace(/\.webp$/i, ".jpeg"));
        }
      }
      return out;
    }

    function validItem(x) {
      return Boolean(x.item_id && x.name);
    }

    const params = new URLSearchParams(window.location.search);
    const hasDataParam = params.has("data");
    const payload = (
      params.get("enc") === "z"
        ? decodeCompressedBase64UrlJson(params.get("data"))
        : decodeBase64UrlJson(params.get("data"))
    ) || decodeBase64UrlJson(params.get("data")) || {};

    const now = new Date();
    const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
    const day = payload.day || payload.d || today;
    const snapshotId = String(payload.snapshot_id || payload.sid || "");
    document.getElementById("day").textContent = day;
    document.getElementById("appMeta").textContent = `Vkusvill Mini App - ${BUILD_ID}`;

    const fallbackItems = Array.isArray(payload.items)
      ? payload.items.map(unpackItem).filter(validItem)
      : [];

    const payloadGroups = Array.isArray(payload.groups) ? payload.groups : [];
    const payloadFavorite = Array.isArray(payload.favorite)
      ? payload.favorite.map(unpackItem).filter(validItem)
      : [];
    const payloadReadyFood = Array.isArray(payload.extra_ready_food)
      ? payload.extra_ready_food.map(unpackItem).filter(validItem)
      : [];
    const compactMap = Array.isArray(payload.m) ? payload.m : [];
    const compactGroups = Array.isArray(payload.g) ? payload.g : [];
    const compactFavorite = Array.isArray(payload.f) ? payload.f : [];
    const compactReadyFood = Array.isArray(payload.r) ? payload.r : [];

    function fallbackGroupsFromItems(items) {
      const favorites = [];
      const regular = [];
      const readyFood = [];
      for (const item of items) {
        const src = item.source.toLowerCase();
        if (src.includes("favorite") || src.includes("fav")) favorites.push(item);
        else if (src.startsWith("vkusvill_offers_ready_food")) readyFood.push(item);
        else regular.push(item);
      }
      regular.splice(18);
      const groups = [];
      for (let i = 0; i < 3; i++) {
        groups.push({
          id: `g${i + 1}`,
          title: `Подборка ${i + 1}`,
          items: regular.slice(i * 6, i * 6 + 6),
          type: "group",
        });
      }
      return { groups, favorite: favorites.slice(0, 1), readyFood };
    }

    let groups = [];
    let favoriteItems = [];
    let readyFoodItems = [];
    if (compactMap.length && compactGroups.length) {
      const mapItem = (idx) => {
        const row = compactMap[Number(idx)];
        if (!Array.isArray(row) || row.length < 3) return null;
        return {
          item_id: String(row[0] || ""),
          name: String(row[1] || ""),
          price: 0,
          discount_price: Number(row[2] || 0),
          source: "",
          image_url: expandImageUrl(row[3]),
        };
      };
      groups = [0, 1, 2].map((idx) => {
        const ids = Array.isArray(compactGroups[idx]) ? compactGroups[idx] : [];
        const gItems = ids.map(mapItem).filter(validItem);
        return {
          id: `g${idx + 1}`,
          title: `Подборка ${idx + 1}`,
          items: gItems.slice(0, 6),
          type: "group",
        };
      });
      favoriteItems = compactFavorite.map(mapItem).filter(validItem).slice(0, 1);
      readyFoodItems = compactReadyFood.map(mapItem).filter(validItem);
    } else if (payloadGroups.length) {
      groups = [0, 1, 2].map((idx) => {
        const g = payloadGroups[idx] || {};
        const gItems = Array.isArray(g.items) ? g.items.map(unpackItem).filter(validItem) : [];
        return {
          id: String(g.id || `g${idx + 1}`),
          title: String(g.title || `Подборка ${idx + 1}`),
          items: gItems.slice(0, 6),
          type: "group",
        };
      });
      favoriteItems = payloadFavorite.slice(0, 1);
      readyFoodItems = payloadReadyFood;
    } else {
      const fb = fallbackGroupsFromItems(fallbackItems);
      groups = fb.groups;
      favoriteItems = fb.favorite;
      readyFoodItems = fb.readyFood;
    }

    const tabs = [...groups];
    if (favoriteItems.length) {
      tabs.push({
        id: "favorite",
        title: "Любимый",
        items: favoriteItems,
        type: "favorite",
      });
    }
    if (readyFoodItems.length) {
      tabs.push({
        id: "ready_food",
        title: "Готовая еда",
        items: readyFoodItems,
        type: "ready_food",
      });
    }

    const allById = new Map();
    for (const item of [...groups.flatMap((g) => g.items), ...favoriteItems, ...readyFoodItems]) {
      if (!item?.item_id) continue;
      if (!allById.has(item.item_id)) allById.set(item.item_id, item);
    }
    const allRealItems = Array.from(allById.values());

    function updateOverview() {
      const el = document.getElementById("overviewSub");
      if (!el) return;
      const regularCount = Number(payload.regular_count ?? payload.rc ?? groups.reduce((acc, g) => acc + g.items.length, 0));
      const regularCapacity = Number(payload.regular_capacity ?? payload.cap ?? 18);
      const parts = [`3 подборки по 6 (${regularCount}/${regularCapacity})`];
      if (favoriteItems.length) parts.push("любимый товар отдельно");
      if (regularCount < regularCapacity) {
        parts.push("часть слотов недоступна сегодня (лимит замен)");
      }
      if (readyFoodItems.length) parts.push(`готовая еда: ${readyFoodItems.length}`);
      el.textContent = `${parts.join(", ")}.`;
    }

    function setSendState(text, kind = "ok") {
      const el = document.getElementById("sendState");
      if (!el) return;
      el.style.display = "block";
      el.className = `send-state ${kind}`;
      el.textContent = text;
    }
    const selected = {};
    for (const item of allRealItems) {
      const initial = Number((payload.your || {})[item.item_id] || 0);
      selected[item.item_id] = initial > 0 ? 1 : 0;
    }

    let activeTab = tabs.length ? tabs[0].id : "g1";

    function rub(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n)) return "--";
      const text = Number.isInteger(n) ? String(n) : n.toFixed(2);
      return `${text} ₽`;
    }

    function selectedCount() {
      return Object.values(selected).reduce((acc, n) => acc + Number(n || 0), 0);
    }

    function updateSummary() {
      document.getElementById("summary").textContent = `Выбрано: ${selectedCount()}`;
    }

    function getActiveTab() {
      return tabs.find((x) => x.id === activeTab) || tabs[0] || null;
    }

    function setTabSelection(mode) {
      const tab = getActiveTab();
      if (!tab || !Array.isArray(tab.items) || !tab.items.length) return;
      const next = mode === "all" ? 1 : 0;
      for (const item of tab.items) {
        if (!item?.item_id) continue;
        selected[item.item_id] = next;
      }
      renderGroup();
      updateSummary();
    }

    function toggleItem(itemId) {
      if (!itemId) return;
      selected[itemId] = selected[itemId] ? 0 : 1;
      renderGroup();
      updateSummary();
    }

    function renderTabs() {
      const root = document.getElementById("tabs");
      root.innerHTML = "";
      for (const tab of tabs) {
        const btn = document.createElement("button");
        btn.className = `tab${tab.id === activeTab ? " active" : ""}`;
        if (tab.type === "group") {
          btn.textContent = `${tab.title} (${tab.items.length}/6)`;
        } else {
          btn.textContent = `${tab.title} (${tab.items.length})`;
        }
        btn.addEventListener("click", () => {
          activeTab = tab.id;
          renderTabs();
          renderGroup();
        });
        root.appendChild(btn);
      }
    }

    function renderPlaceholder(itemsEl, idx) {
      const wrap = document.createElement("article");
      wrap.className = "item";
      const name = document.createElement("div");
      name.className = "name";
      name.textContent = `Слот ${idx + 1}: ожидаем после обновления`;
      wrap.appendChild(name);

      const prices = document.createElement("div");
      prices.className = "price-row";
      prices.innerHTML = `
        <div class="price-box">
          <div class="price-label">Цена</div>
          <div class="price-val discount">--</div>
        </div>
      `;
      wrap.appendChild(prices);

      const t = document.createElement("button");
      t.className = "toggle";
      t.textContent = "Ожидание";
      t.disabled = true;
      wrap.appendChild(t);
      itemsEl.appendChild(wrap);
    }

    function renderRealItem(itemsEl, item) {
      const wrap = document.createElement("article");
      const isSelected = Boolean(selected[item.item_id]);
      wrap.className = `item${isSelected ? " selected" : ""}`;

      const src = String(item.source || "").toLowerCase();
      const isFavorite = src.includes("favorite") || src.includes("fav") || String(item.item_id || "").startsWith("fav_");
      const isReadyFood = src.startsWith("vkusvill_offers_ready_food");
      if (isFavorite || isReadyFood) {
        const meta = document.createElement("div");
        meta.className = "item-meta";
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = isFavorite ? "❤️ Любимый" : "🍱 Готовая еда";
        meta.appendChild(tag);
        wrap.appendChild(meta);
      }

      const head = document.createElement("div");
      head.className = "item-head";
      const thumb = document.createElement("div");
      thumb.className = "thumb";
      const imageUrl = String(item.image_url || "").trim();
      if (imageUrl) {
        const candidates = buildImageCandidates(imageUrl);
        const img = document.createElement("img");
        img.alt = item.name;
        img.loading = "lazy";
        let idx = 0;
        const loadNext = () => {
          if (idx >= candidates.length) {
            thumb.innerHTML = `<span class="thumb-ph">${isReadyFood ? "🍱" : "🥗"}</span>`;
            return;
          }
          img.src = candidates[idx];
          idx += 1;
        };
        img.onerror = () => {
          loadNext();
        };
        thumb.appendChild(img);
        loadNext();
      } else {
        thumb.innerHTML = `<span class="thumb-ph">${isReadyFood ? "🍱" : "🥗"}</span>`;
      }
      head.appendChild(thumb);

      const main = document.createElement("div");
      main.className = "item-main";
      const name = document.createElement("div");
      name.className = "name";
      name.textContent = item.name;
      main.appendChild(name);

      const prices = document.createElement("div");
      prices.className = "price-row";
      const currentPrice = Number(item.discount_price || item.price || 0);
      prices.innerHTML = `
        <div class="price-box">
          <div class="price-label">💸 Цена</div>
          <div class="price-val discount">${rub(currentPrice)}</div>
        </div>
      `;
      main.appendChild(prices);
      head.appendChild(main);
      wrap.appendChild(head);

      const t = document.createElement("button");
      t.className = `toggle${isSelected ? " active" : ""}`;
      t.textContent = isSelected ? "✅ Выбрано" : "Выбрать";
      t.addEventListener("click", () => toggleItem(item.item_id));
      wrap.appendChild(t);
      itemsEl.appendChild(wrap);
    }

    function renderGroup() {
      const titleEl = document.getElementById("groupTitle");
      const subEl = document.getElementById("groupSub");
      const itemsEl = document.getElementById("items");
      const toolsEl = document.getElementById("groupTools");
      const selectBtn = document.getElementById("selectTabBtn");
      const clearBtn = document.getElementById("clearTabBtn");
      itemsEl.innerHTML = "";

      const tab = getActiveTab();
      if (!tab) {
        titleEl.textContent = "Нет товаров";
        subEl.textContent = "";
        if (toolsEl) toolsEl.style.display = "none";
        const empty = document.createElement("div");
        empty.className = "empty";
        if (!hasDataParam) {
          empty.innerHTML = "Здесь нет данных по товарам.<br/>Открой Mini App через команду /app в боте.";
        } else {
          empty.innerHTML = "Пока нет товаров на сегодня.<br/>Обновление идет автоматически в 10:00 (Europe/Moscow).";
        }
        itemsEl.appendChild(empty);
        return;
      }

      titleEl.textContent = tab.title;
      if (tab.type === "group") {
        subEl.textContent = `${tab.items.length}/6 товаров`;
      } else {
        subEl.textContent = `${tab.items.length} товаров`;
      }

      if (toolsEl) {
        toolsEl.style.display = tab.items.length ? "flex" : "none";
      }
      if (selectBtn) {
        selectBtn.disabled = !tab.items.length;
        selectBtn.textContent = tab.type === "group" ? "Выбрать 6" : "Выбрать всё";
      }
      if (clearBtn) {
        clearBtn.disabled = !tab.items.length;
      }

      for (const item of tab.items) {
        renderRealItem(itemsEl, item);
      }

      if (tab.type === "group" && tab.items.length < 6) {
        for (let idx = tab.items.length; idx < 6; idx++) {
          renderPlaceholder(itemsEl, idx);
        }
      }
    }

    function sendAll() {
      const btn = document.getElementById("sendAllBtn");
      if (btn) {
        btn.disabled = true;
        btn.textContent = "Отправляем...";
      }
      const qty = {};
      for (const item of allRealItems) {
        qty[item.item_id] = selected[item.item_id] ? 1 : 0;
      }
      const payloadOut = { type: "all_choices", day, snapshot_id: snapshotId, qty };
      try {
        if (!tg || typeof tg.sendData !== "function") {
          throw new Error("Telegram WebApp API unavailable");
        }
        tg.sendData(JSON.stringify(payloadOut));
        setSendState("Выбор отправлен. Если не пришел ответ бота в чате за 3-5 секунд, открой /app заново.", "ok");
      } catch (err) {
        const reason = (err && err.message) ? err.message : "unknown";
        const hasTg = Boolean(tg);
        const hasSendData = Boolean(tg && typeof tg.sendData === "function");
        const initDataLen = (tg && tg.initData) ? String(tg.initData).length : 0;
        setSendState(
          `Отправка не сработала (${reason}). hasTg=${hasTg}, hasSendData=${hasSendData}, initDataLen=${initDataLen}.`,
          "err",
        );
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = "Отправить выбор";
        }
      }
    }

    document.getElementById("sendAllBtn").addEventListener("click", sendAll);
    document.getElementById("closeBtn").addEventListener("click", () => tg?.close());
    document.getElementById("selectTabBtn").addEventListener("click", () => setTabSelection("all"));
    document.getElementById("clearTabBtn").addEventListener("click", () => setTabSelection("none"));

    updateSummary();
    updateOverview();
    renderTabs();
    renderGroup();
  </script>
</body>
</html>
