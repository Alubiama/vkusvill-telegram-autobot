<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vkusvill Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg0: #f4f1e8;
      --bg1: #fff7dc;
      --card: #ffffff;
      --ink: #1f2f22;
      --muted: #58705f;
      --ok: #2e8b57;
      --line: #d8dfd8;
      --accent: #2f8a57;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 90% -10%, #ffe9a8 0%, transparent 46%),
        radial-gradient(circle at -10% 120%, #cfe7d4 0%, transparent 44%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--ink);
      min-height: 100vh;
      padding: 8px;
    }
    .shell {
      max-width: 640px;
      margin: 0 auto;
      display: grid;
      gap: 8px;
      padding-bottom: 8px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 9px;
      box-shadow: 0 8px 22px rgba(38, 55, 39, 0.07);
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .t1 { font-size: 11px; color: var(--muted); }
    .t2 { font-size: 15px; font-weight: 700; }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 8px;
      font-size: 12px;
      background: #f9fcf7;
      white-space: nowrap;
    }
    .section-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .section-sub {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .tabs {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .tab {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      padding: 6px 9px;
      white-space: nowrap;
      cursor: pointer;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .items {
      display: grid;
      gap: 6px;
    }
    .item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px;
      background: #fbfefb;
    }
    .name {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .price-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 6px;
    }
    .price-box {
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 6px;
      background: #fff;
    }
    .price-label { font-size: 11px; color: var(--muted); }
    .price-val { font-size: 14px; font-weight: 700; }
    .discount { color: var(--ok); }
    .toggle {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      padding: 8px 7px;
      cursor: pointer;
    }
    .toggle.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .toggle:disabled {
      opacity: 0.7;
      cursor: default;
      color: var(--muted);
      background: #f6f8f4;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      position: sticky;
      bottom: 0;
      background: linear-gradient(180deg, rgba(255, 247, 220, 0), rgba(255, 247, 220, 0.95) 28%);
      padding-top: 8px;
    }
    .action-btn {
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      padding: 8px 7px;
      cursor: pointer;
    }
    .action-btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 20px 10px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="card top">
      <div>
        <div class="t1">Vkusvill Mini App</div>
        <div class="t2" id="day">-</div>
      </div>
      <div class="pill" id="summary">Выбрано: 0</div>
    </section>

    <section class="card">
      <div class="section-title">Товары на сегодня</div>
      <div class="section-sub">3 подборки по 6. Любимый товар вынесен отдельно.</div>
      <div id="tabs" class="tabs"></div>
    </section>

    <section class="card">
      <div class="section-title" id="groupTitle">-</div>
      <div class="section-sub" id="groupSub">-</div>
      <div id="items" class="items"></div>
    </section>

    <section class="actions">
      <button class="action-btn primary" id="sendAllBtn">Отправить выбор</button>
      <button class="action-btn" id="closeBtn">Закрыть</button>
    </section>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.expand();
      tg.ready();
    }

    function decodeBase64UrlJson(raw) {
      if (!raw) return null;
      try {
        const padded = raw + "=".repeat((4 - (raw.length % 4)) % 4);
        const b64 = padded.replace(/-/g, "+").replace(/_/g, "/");
        const binary = atob(b64);
        const bytes = Uint8Array.from(binary, (ch) => ch.charCodeAt(0));
        const text = new TextDecoder("utf-8").decode(bytes);
        return JSON.parse(text);
      } catch (_err) {
        return null;
      }
    }

    function unpackItem(x) {
      return {
        item_id: String(x?.i || x?.item_id || ""),
        name: String(x?.n || x?.name || ""),
        price: Number(x?.p ?? x?.price ?? 0),
        discount_price: Number(x?.d ?? x?.discount_price ?? 0),
        source: String(x?.s || x?.source || ""),
      };
    }

    function validItem(x) {
      return Boolean(x.item_id && x.name);
    }

    const params = new URLSearchParams(window.location.search);
    const hasDataParam = params.has("data");
    const payload = decodeBase64UrlJson(params.get("data")) || {};

    const now = new Date();
    const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
    const day = payload.day || today;
    document.getElementById("day").textContent = day;

    const fallbackItems = Array.isArray(payload.items)
      ? payload.items.map(unpackItem).filter(validItem)
      : [];

    const payloadGroups = Array.isArray(payload.groups) ? payload.groups : [];
    const payloadFavorite = Array.isArray(payload.favorite)
      ? payload.favorite.map(unpackItem).filter(validItem)
      : [];

    function fallbackGroupsFromItems(items) {
      const favorites = [];
      const regular = [];
      for (const item of items) {
        const src = item.source.toLowerCase();
        if (src.includes("favorite") || src.includes("fav")) favorites.push(item);
        else regular.push(item);
      }
      regular.splice(18);
      const groups = [];
      for (let i = 0; i < 3; i++) {
        groups.push({
          id: `g${i + 1}`,
          title: `Подборка ${i + 1}`,
          items: regular.slice(i * 6, i * 6 + 6),
          type: "group",
        });
      }
      return { groups, favorite: favorites.slice(0, 1) };
    }

    let groups = [];
    let favoriteItems = [];
    if (payloadGroups.length) {
      groups = [0, 1, 2].map((idx) => {
        const g = payloadGroups[idx] || {};
        const gItems = Array.isArray(g.items) ? g.items.map(unpackItem).filter(validItem) : [];
        return {
          id: String(g.id || `g${idx + 1}`),
          title: String(g.title || `Подборка ${idx + 1}`),
          items: gItems.slice(0, 6),
          type: "group",
        };
      });
      favoriteItems = payloadFavorite.slice(0, 1);
    } else {
      const fb = fallbackGroupsFromItems(fallbackItems);
      groups = fb.groups;
      favoriteItems = fb.favorite;
    }

    const tabs = [...groups];
    if (favoriteItems.length) {
      tabs.push({
        id: "favorite",
        title: "Любимый",
        items: favoriteItems,
        type: "favorite",
      });
    }

    const allRealItems = [...groups.flatMap((g) => g.items), ...favoriteItems];
    const selected = {};
    for (const item of allRealItems) {
      const initial = Number((payload.your || {})[item.item_id] || 0);
      selected[item.item_id] = initial > 0 ? 1 : 0;
    }

    let activeTab = tabs.length ? tabs[0].id : "g1";

    function rub(value) {
      return `${Number(value).toFixed(2)} RUB`;
    }

    function selectedCount() {
      return Object.values(selected).reduce((acc, n) => acc + Number(n || 0), 0);
    }

    function updateSummary() {
      document.getElementById("summary").textContent = `Выбрано: ${selectedCount()}`;
    }

    function toggleItem(itemId) {
      if (!itemId) return;
      selected[itemId] = selected[itemId] ? 0 : 1;
      renderGroup();
      updateSummary();
    }

    function renderTabs() {
      const root = document.getElementById("tabs");
      root.innerHTML = "";
      for (const tab of tabs) {
        const btn = document.createElement("button");
        btn.className = `tab${tab.id === activeTab ? " active" : ""}`;
        btn.textContent = `${tab.title} (${tab.items.length})`;
        btn.addEventListener("click", () => {
          activeTab = tab.id;
          renderTabs();
          renderGroup();
        });
        root.appendChild(btn);
      }
    }

    function renderPlaceholder(itemsEl, idx) {
      const wrap = document.createElement("article");
      wrap.className = "item";
      const name = document.createElement("div");
      name.className = "name";
      name.textContent = `Слот ${idx + 1}: ожидаем после обновления`;
      wrap.appendChild(name);

      const prices = document.createElement("div");
      prices.className = "price-row";
      prices.innerHTML = `
        <div class="price-box">
          <div class="price-label">Обычная</div>
          <div class="price-val">--</div>
        </div>
        <div class="price-box">
          <div class="price-label">Со скидкой</div>
          <div class="price-val discount">--</div>
        </div>
      `;
      wrap.appendChild(prices);

      const t = document.createElement("button");
      t.className = "toggle";
      t.textContent = "Ожидание";
      t.disabled = true;
      wrap.appendChild(t);
      itemsEl.appendChild(wrap);
    }

    function renderRealItem(itemsEl, item) {
      const wrap = document.createElement("article");
      wrap.className = "item";

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = item.name;
      wrap.appendChild(name);

      const prices = document.createElement("div");
      prices.className = "price-row";
      prices.innerHTML = `
        <div class="price-box">
          <div class="price-label">Обычная</div>
          <div class="price-val">${rub(item.price)}</div>
        </div>
        <div class="price-box">
          <div class="price-label">Со скидкой</div>
          <div class="price-val discount">${rub(item.discount_price)}</div>
        </div>
      `;
      wrap.appendChild(prices);

      const t = document.createElement("button");
      t.className = `toggle${selected[item.item_id] ? " active" : ""}`;
      t.textContent = selected[item.item_id] ? "Выбрано" : "Выбрать";
      t.addEventListener("click", () => toggleItem(item.item_id));
      wrap.appendChild(t);
      itemsEl.appendChild(wrap);
    }

    function renderGroup() {
      const titleEl = document.getElementById("groupTitle");
      const subEl = document.getElementById("groupSub");
      const itemsEl = document.getElementById("items");
      itemsEl.innerHTML = "";

      const tab = tabs.find((x) => x.id === activeTab) || tabs[0];
      if (!tab) {
        titleEl.textContent = "Нет товаров";
        subEl.textContent = "";
        const empty = document.createElement("div");
        empty.className = "empty";
        if (!hasDataParam) {
          empty.innerHTML = "Здесь нет данных по товарам.<br/>Открой Mini App через команду /app в боте.";
        } else {
          empty.innerHTML = "Пока нет товаров на сегодня.<br/>Сначала запусти /collect в боте.";
        }
        itemsEl.appendChild(empty);
        return;
      }

      titleEl.textContent = tab.title;
      if (tab.type === "group") {
        subEl.textContent = `${tab.items.length}/6 товаров`;
      } else {
        subEl.textContent = `${tab.items.length} товаров`;
      }

      for (const item of tab.items) {
        renderRealItem(itemsEl, item);
      }

      if (tab.type === "group" && tab.items.length < 6) {
        for (let idx = tab.items.length; idx < 6; idx++) {
          renderPlaceholder(itemsEl, idx);
        }
      }
    }

    function sendAll() {
      const qty = {};
      for (const item of allRealItems) {
        qty[item.item_id] = selected[item.item_id] ? 1 : 0;
      }
      const payloadOut = { type: "all_choices", day, qty };
      tg?.sendData(JSON.stringify(payloadOut));
      tg?.close();
    }

    document.getElementById("sendAllBtn").addEventListener("click", sendAll);
    document.getElementById("closeBtn").addEventListener("click", () => tg?.close());

    updateSummary();
    renderTabs();
    renderGroup();
  </script>
</body>
</html>
