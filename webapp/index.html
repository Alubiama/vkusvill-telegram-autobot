<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vkusvill Showcase</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg0: #f4f1e8;
      --bg1: #fff7dc;
      --card: #ffffff;
      --ink: #1f2f22;
      --muted: #58705f;
      --ok: #2e8b57;
      --accent: #e36f2c;
      --line: #d8dfd8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 90% -10%, #ffe9a8 0%, transparent 46%),
        radial-gradient(circle at -10% 120%, #cfe7d4 0%, transparent 44%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--ink);
      min-height: 100vh;
      padding: 14px;
    }
    .shell {
      max-width: 640px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      background: #ffffffd6;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px 12px;
      backdrop-filter: blur(5px);
    }
    .t1 { font-size: 14px; color: var(--muted); }
    .t2 { font-size: 18px; font-weight: 700; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 12px 30px rgba(38, 55, 39, 0.08);
      animation: rise .25s ease;
    }
    @keyframes rise {
      from { transform: translateY(5px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .name { font-size: 20px; font-weight: 700; line-height: 1.2; }
    .price-row {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .price-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fdfefb;
    }
    .price-label { font-size: 12px; color: var(--muted); }
    .price { font-size: 20px; font-weight: 700; }
    .disc .price { color: var(--ok); }
    .save {
      margin-top: 8px;
      color: #6f3514;
      background: #ffe7d8;
      border: 1px solid #ffc7a4;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 700;
      display: inline-block;
    }
    .qty-panel {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .qty {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      background: #fafdfa;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: white;
      color: var(--ink);
      font-size: 13px;
      padding: 9px 6px;
      font-weight: 700;
      cursor: pointer;
    }
    button.primary { background: #2f8a57; color: #fff; border-color: #2f8a57; }
    button.warn { background: #fdf3eb; color: #7c3c1a; }
    .nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: center;
    }
    .pager { text-align: center; font-weight: 700; color: var(--muted); }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <div>
        <div class="t1">Vkusvill Mini App</div>
        <div class="t2" id="day"></div>
      </div>
      <div class="qty" id="summary">Selected: 0</div>
    </div>

    <section class="card">
      <div class="name" id="name">Loading...</div>
      <div class="price-row">
        <div class="price-box">
          <div class="price-label">Regular</div>
          <div class="price" id="price">0 RUB</div>
        </div>
        <div class="price-box disc">
          <div class="price-label">Discount</div>
          <div class="price" id="disc">0 RUB</div>
        </div>
      </div>
      <div class="save" id="save">Savings: 0 RUB</div>
      <div class="qty-panel">
        <div class="qty" id="you">Your qty: 0</div>
        <div class="qty" id="group">Group qty: 0</div>
      </div>
      <div class="buttons" style="margin-top:10px;">
        <button onclick="change(-1)">-1</button>
        <button onclick="change(1)">+1</button>
        <button onclick="change(2)" class="primary">+2</button>
        <button onclick="resetQty()" class="warn">Reset</button>
        <button onclick="sendChoice()">Send</button>
      </div>
    </section>

    <section class="card nav">
      <button onclick="move(-1)">Prev</button>
      <div class="pager" id="pager">1/1</div>
      <button onclick="move(1)">Next</button>
    </section>

    <section class="card actions">
      <button onclick="sendAll()" class="primary">Send All Choices</button>
      <button onclick="window.Telegram.WebApp.close()">Close</button>
    </section>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.expand();
      tg.ready();
    }

    const today = new Date().toISOString().slice(0, 10);
    document.getElementById("day").textContent = today;

    const sample = [
      { item_id: "a1", name: "Product 1", price: 300, discount_price: 240 },
      { item_id: "a2", name: "Product 2", price: 220, discount_price: 176 },
    ];

    // Optional: pass encoded JSON via ?items=<urlencoded_json>
    const raw = new URLSearchParams(location.search).get("items");
    const items = raw ? JSON.parse(decodeURIComponent(raw)) : sample;
    let idx = 0;
    const qty = Object.fromEntries(items.map((x) => [x.item_id, 0]));

    function fmt(n) { return `${Number(n).toFixed(2)} RUB`; }

    function render() {
      const item = items[idx];
      document.getElementById("name").textContent = item.name;
      document.getElementById("price").textContent = fmt(item.price);
      document.getElementById("disc").textContent = fmt(item.discount_price);
      document.getElementById("save").textContent = `Savings: ${fmt(item.price - item.discount_price)}`;
      document.getElementById("you").textContent = `Your qty: ${qty[item.item_id]}`;
      document.getElementById("group").textContent = "Group qty: n/a in demo";
      document.getElementById("pager").textContent = `${idx + 1}/${items.length}`;
      const selected = Object.values(qty).reduce((a, b) => a + b, 0);
      document.getElementById("summary").textContent = `Selected: ${selected}`;
    }

    function move(step) {
      idx = (idx + step + items.length) % items.length;
      render();
    }

    function change(delta) {
      const id = items[idx].item_id;
      qty[id] = Math.max(0, qty[id] + delta);
      render();
    }

    function resetQty() {
      qty[items[idx].item_id] = 0;
      render();
    }

    function sendChoice() {
      const item = items[idx];
      const payload = {
        type: "single_choice",
        day: today,
        item_id: item.item_id,
        qty: qty[item.item_id],
      };
      tg?.sendData(JSON.stringify(payload));
    }

    function sendAll() {
      const payload = { type: "all_choices", day: today, qty };
      tg?.sendData(JSON.stringify(payload));
      tg?.close();
    }

    render();
  </script>
</body>
</html>
