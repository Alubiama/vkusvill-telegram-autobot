<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vkusvill Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg0: #f4f1e8;
      --bg1: #fff7dc;
      --card: #ffffff;
      --ink: #1f2f22;
      --muted: #58705f;
      --ok: #2e8b57;
      --line: #d8dfd8;
      --accent: #2f8a57;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 90% -10%, #ffe9a8 0%, transparent 46%),
        radial-gradient(circle at -10% 120%, #cfe7d4 0%, transparent 44%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--ink);
      min-height: 100vh;
      padding: 12px;
    }
    .shell {
      max-width: 700px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
      padding-bottom: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 8px 22px rgba(38, 55, 39, 0.07);
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .t1 { font-size: 13px; color: var(--muted); }
    .t2 { font-size: 20px; font-weight: 700; }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 13px;
      background: #f9fcf7;
      white-space: nowrap;
    }
    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .section-sub {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }
    .items {
      display: grid;
      gap: 8px;
    }
    .item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: #fbfefb;
    }
    .name {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .price-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }
    .price-box {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #fff;
    }
    .price-label { font-size: 12px; color: var(--muted); }
    .price-val { font-size: 18px; font-weight: 700; }
    .discount { color: var(--ok); }
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }
    .meta-box {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 8px;
      font-size: 13px;
      background: #fff;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 6px;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      padding: 8px 6px;
      cursor: pointer;
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.warn { background: #fdf3eb; color: #7c3c1a; }
    button.send { grid-column: span 2; }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      position: sticky;
      bottom: 0;
      background: linear-gradient(180deg, rgba(255, 247, 220, 0), rgba(255, 247, 220, 0.95) 28%);
      padding-top: 10px;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 20px 10px;
      line-height: 1.35;
    }
    @media (max-width: 520px) {
      .controls { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      button.send { grid-column: span 3; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="card top">
      <div>
        <div class="t1">Vkusvill Mini App</div>
        <div class="t2" id="day">-</div>
      </div>
      <div class="pill" id="summary">Выбрано: 0</div>
    </section>

    <section class="card">
      <div class="section-title">Товары на сегодня</div>
      <div class="section-sub">Сначала идут подборки по 6, затем любимый товар (если есть).</div>
      <div id="groups"></div>
    </section>

    <section class="actions">
      <button class="primary" id="sendAllBtn">Отправить весь выбор</button>
      <button id="closeBtn">Закрыть</button>
    </section>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.expand();
      tg.ready();
    }

    function decodeBase64UrlJson(raw) {
      if (!raw) return null;
      try {
        const padded = raw + "=".repeat((4 - (raw.length % 4)) % 4);
        const b64 = padded.replace(/-/g, "+").replace(/_/g, "/");
        const binary = atob(b64);
        const bytes = Uint8Array.from(binary, (ch) => ch.charCodeAt(0));
        const text = new TextDecoder("utf-8").decode(bytes);
        return JSON.parse(text);
      } catch (_err) {
        return null;
      }
    }

    const params = new URLSearchParams(window.location.search);
    const hasDataParam = params.has("data");
    const payload = decodeBase64UrlJson(params.get("data")) || {};
    const today = new Date().toISOString().slice(0, 10);
    const day = payload.day || today;
    document.getElementById("day").textContent = day;

    const items = Array.isArray(payload.items) ? payload.items.map((x) => ({
      item_id: String(x.i || x.item_id || ""),
      name: String(x.n || x.name || ""),
      price: Number(x.p ?? x.price ?? 0),
      discount_price: Number(x.d ?? x.discount_price ?? 0),
      source: String(x.s || x.source || ""),
    })).filter((x) => x.item_id && x.name) : [];

    const groupTotals = payload.totals || {};
    const qty = {};
    for (const item of items) {
      const initial = Number((payload.your || {})[item.item_id] || 0);
      qty[item.item_id] = Number.isFinite(initial) ? Math.max(0, initial) : 0;
    }

    function rub(value) {
      return `${Number(value).toFixed(2)} RUB`;
    }

    function allGroups() {
      const favorites = [];
      const regular = [];
      for (const item of items) {
        const src = item.source.toLowerCase();
        if (src.includes("favorite") || src.includes("fav")) favorites.push(item);
        else regular.push(item);
      }

      const result = [];
      for (let i = 0; i < regular.length; i += 6) {
        const slice = regular.slice(i, i + 6);
        result.push({
          title: `Подборка ${Math.floor(i / 6) + 1}`,
          subtitle: `${slice.length} товаров`,
          items: slice,
        });
      }
      if (favorites.length) {
        result.push({
          title: "Любимый продукт",
          subtitle: `${favorites.length} товаров`,
          items: favorites,
        });
      }
      return result;
    }

    function selectedCount() {
      return Object.values(qty).reduce((acc, n) => acc + Number(n || 0), 0);
    }

    function updateSummary() {
      const picked = selectedCount();
      document.getElementById("summary").textContent = `Выбрано: ${picked}`;
    }

    function changeBy(itemId, delta) {
      qty[itemId] = Math.max(0, Number(qty[itemId] || 0) + delta);
      render();
    }

    function resetOne(itemId) {
      qty[itemId] = 0;
      render();
    }

    function sendSingle(itemId) {
      const payloadOut = {
        type: "single_choice",
        day,
        item_id: itemId,
        qty: Number(qty[itemId] || 0),
      };
      tg?.sendData(JSON.stringify(payloadOut));
    }

    function sendAll() {
      const payloadOut = { type: "all_choices", day, qty };
      tg?.sendData(JSON.stringify(payloadOut));
      tg?.close();
    }

    function renderItem(item) {
      const wrap = document.createElement("article");
      wrap.className = "item";

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = item.name;
      wrap.appendChild(name);

      const prices = document.createElement("div");
      prices.className = "price-row";
      prices.innerHTML = `
        <div class="price-box">
          <div class="price-label">Обычная</div>
          <div class="price-val">${rub(item.price)}</div>
        </div>
        <div class="price-box">
          <div class="price-label">Со скидкой</div>
          <div class="price-val discount">${rub(item.discount_price)}</div>
        </div>
      `;
      wrap.appendChild(prices);

      const meta = document.createElement("div");
      meta.className = "meta";
      const you = Number(qty[item.item_id] || 0);
      const grp = Number(groupTotals[item.item_id] || 0);
      meta.innerHTML = `
        <div class="meta-box">Ваше кол-во: ${you}</div>
        <div class="meta-box">В группе: ${grp}</div>
      `;
      wrap.appendChild(meta);

      const controls = document.createElement("div");
      controls.className = "controls";

      const mkBtn = (label, cls, handler) => {
        const b = document.createElement("button");
        b.textContent = label;
        if (cls) b.className = cls;
        b.addEventListener("click", handler);
        return b;
      };

      controls.appendChild(mkBtn("-1", "", () => changeBy(item.item_id, -1)));
      controls.appendChild(mkBtn("+1", "", () => changeBy(item.item_id, 1)));
      controls.appendChild(mkBtn("+2", "primary", () => changeBy(item.item_id, 2)));
      controls.appendChild(mkBtn("0", "warn", () => resetOne(item.item_id)));
      controls.appendChild(mkBtn("Отправить", "send", () => sendSingle(item.item_id)));
      wrap.appendChild(controls);

      return wrap;
    }

    function render() {
      const root = document.getElementById("groups");
      root.innerHTML = "";
      updateSummary();

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        if (!hasDataParam) {
          empty.innerHTML = "Здесь нет данных по товарам.<br/>Открой Mini App через команду /app в боте.";
        } else {
          empty.innerHTML = "Пока нет товаров на сегодня.<br/>Сначала запусти /collect в боте.";
        }
        root.appendChild(empty);
        return;
      }

      for (const group of allGroups()) {
        const sec = document.createElement("section");
        sec.className = "card";

        const title = document.createElement("div");
        title.className = "section-title";
        title.textContent = group.title;
        sec.appendChild(title);

        const sub = document.createElement("div");
        sub.className = "section-sub";
        sub.textContent = group.subtitle;
        sec.appendChild(sub);

        const itemsBox = document.createElement("div");
        itemsBox.className = "items";
        for (const item of group.items) {
          itemsBox.appendChild(renderItem(item));
        }
        sec.appendChild(itemsBox);

        root.appendChild(sec);
      }
    }

    document.getElementById("sendAllBtn").addEventListener("click", sendAll);
    document.getElementById("closeBtn").addEventListener("click", () => tg?.close());
    render();
  </script>
</body>
</html>
